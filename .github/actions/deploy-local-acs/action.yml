name: deploy-local-acs
description: Deploy local ACS for E2E testing

inputs:
  docker_username:
    description: 'Docker username'
    required: true
  docker_password:
    description: 'Docker password'
    required: true
  quay_username:
    description: 'Quay username'
    required: true
  quay_password:
    description: 'Quay password'
    required: true
  acs_deployment_version:
    description: 'ACS deployment version (defaults to latest)'
    required: false
    default: 'latest'

runs:
  using: "composite"
  steps:
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
      with:
        version: "3.14.3"

    - name: Login to Docker Hub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0
      with:
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}

    - name: Login to Quay.io
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0
      with:
        registry: quay.io
        username: ${{ inputs.quay_username }}
        password: ${{ inputs.quay_password }}

    - name: Setup cluster
      uses: Alfresco/alfresco-build-tools/.github/actions/setup-kind@v12.1.0
      with:
        ingress-nginx-ref: controller-v1.8.2
        ingress-creation-timeout: 180s

    - name: Set nginx ingress config
      shell: bash
      run: >-
        kubectl -n ingress-nginx patch cm ingress-nginx-controller
        -p '{"data": {"allow-snippet-annotations":"true"}}'

    - name: Create registries auth secret
      shell: bash
      run: >-
        kubectl create secret generic regcred
        --from-file=.dockerconfigjson=$HOME/.docker/config.json
        --type=kubernetes.io/dockerconfigjson
        --dry-run=client -o yaml | kubectl apply -f -

    - name: Add dependency chart repos
      shell: bash
      run: |
        helm repo add self https://alfresco.github.io/alfresco-helm-charts/
        helm repo add elastic https://helm.elastic.co/
        helm repo update

    - name: Get latest ACS deployment version
      id: get-acs-version
      shell: bash
      env:
        ACS_VERSION_INPUT: ${{ inputs.acs_deployment_version }}
      run: |
        if [ "$ACS_VERSION_INPUT" = "latest" ]; then
          latest_tag=$(curl -s https://api.github.com/repos/Alfresco/acs-deployment/releases/latest | jq -r .tag_name)
          echo "Using latest ACS deployment version: $latest_tag"
          echo "version=$latest_tag" >> $GITHUB_OUTPUT
        else
          echo "Using specified ACS deployment version: $ACS_VERSION_INPUT"
          echo "version=$ACS_VERSION_INPUT" >> $GITHUB_OUTPUT
        fi

    - name: Checkout acs-deployment ${{ steps.get-acs-version.outputs.version }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        repository: Alfresco/acs-deployment
        ref: ${{ steps.get-acs-version.outputs.version }}
        path: acs-deployment

    - name: Helm install
      shell: bash
      run: >-
        helm dep build acs-deployment/helm/alfresco-content-services &&
        helm install acs acs-deployment/helm/alfresco-content-services
        --wait --timeout 15m
        --set global.search.sharedSecret="$(openssl rand -hex 24)"
        --values acs-deployment/test/enterprise-integration-test-values.yaml
        --values .github/acs-deployment-values-override.yaml

    - name: Wait for pods to be ready
      uses: Alfresco/alfresco-build-tools/.github/actions/kubectl-wait@v12.1.0

    - name: Wait for ACS endpoints and API readiness
      shell: bash
      run: |
        set -euo pipefail

        echo "Waiting for acs-alfresco-repository endpoints..."
        end=$((SECONDS+900))
        while [ $SECONDS -lt $end ]; do
          ip=$(kubectl get endpoints acs-alfresco-repository -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)
          if [ -n "$ip" ]; then
            echo "Repository endpoint is ready: $ip"
            break
          fi
          sleep 10
        done

        if [ -z "${ip:-}" ]; then
          echo "Repository endpoint did not become ready in time."
          kubectl get endpoints acs-alfresco-repository -o yaml
          exit 1
        fi

        echo "Waiting for ACS discovery API..."
        end=$((SECONDS+600))
        while [ $SECONDS -lt $end ]; do
          if curl -fsS "http://localhost/alfresco/api/discovery" >/dev/null; then
            echo "Discovery API is ready."
            break
          fi
          sleep 5
        done

        echo "Waiting for ACS search API..."
        end=$((SECONDS+600))
        while [ $SECONDS -lt $end ]; do
          if curl -fsS -u admin:admin \
            -H "Content-Type: application/json" \
            -d '{"query":{"query":"*"}}' \
            "http://localhost/alfresco/api/-default-/public/search/versions/1/search" \
            >/dev/null; then
            echo "Search API is ready."
            exit 0
          fi
          sleep 5
        done

        echo "Search API did not become ready in time."
        exit 1
